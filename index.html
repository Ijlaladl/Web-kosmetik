<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech4 Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex flex-col font-sans">

 <header id="main-header" class="bg-pink-300 text-white p-4">

    <div class="flex justify-between items-center">
        
        <div class="flex flex-col items-center w-full">
            <h1 class="text-2xl font-bold">💄 SEEL BEAUTY</h1>

           
            <div class="marquee-container text-center mt-1">
                <div class="marquee-text font-semibold text-sm">
                    ✨ Selamat Datang di Web Kosmetik Seel ✨
                </div>
            </div>
        </div>

        
        <div class="absolute right-4 top-6">
            🛒 <span id="cart-count" class="bg-white text-pink-300 px-2 py-1 rounded-full text-xs font-bold">0</span>
        </div>
    </div>

</header>
    
    <div id="main-wrapper" class="grid grid-cols-5">

        <nav id="main-navigation" class="col-span-1 grid grid-cols-1 content-start bg-slate-100 p-4 border-r border-slate-300">
            </nav>

        <main id="main-content" class="col-span-3 grid grid-cols-1 content-start bg-white p-6">
            <article class="grid grid-cols-1 gap-4">
                </article>
        </main>

        <aside id="right-sidebar" class="col-span-1 grid grid-cols-1 content-start bg-slate-50 p-4 border-l border-slate-300">
            </aside>

    </div>

    <footer id="main-footer" class="grid grid-cols-1 items-center bg-slate-900 text-white p-4 text-center h-16">
        </footer>

</body>
</html>
